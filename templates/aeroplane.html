<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AeroStress 360</title>

    <style>
        /* RESET */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
        }


        /* NAVBAR CONTAINER */
        .plane-navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 190px;
            z-index: 1000;
        }


        /* PLANE IMAGE */
        .plane-img {
            width: 100%;
            height: 190px;
            object-fit: cover;
        }


        /* LOGO POSITION */
        .logo {
            position: absolute;
            top: 65px;
            left: 40px;
            width: 140px;
        }


        /* MENU POSITION */
        .menu {
            position: absolute;
            top: 85px;
            left: 260px;
        }


        /* MENU STYLE */
        .menu a {
            text-decoration: none;
            color: black;
            font-size: 20px;
            font-weight: bold;
            margin-right: 45px;
            letter-spacing: 2px;
            transition: 0.3s;
        }


        /* HOVER EFFECT */
        .menu a:hover {
            color: #0077ff;
            transform: scale(1.05);
        }


        /* PAGE CONTENT */
        .content {
            margin-top: 210px;
            padding: 40px;
        }
    </style>

</head>



<body>


    <!-- NAVBAR -->
    <nav class="plane-navbar">

        <!-- plane image -->
        <img src="plane.png" class="plane-img">


        <!-- AeroStress logo -->
        <img src="logo.png" class="logo">


        <!-- menu -->
        <div class="menu">

            <a href="#">Dashboard</a>

            <a href="#">Predictions</a>

            <a href="#">Flight Map</a>

            <a href="#">Settings</a>

        </div>

    </nav>



    <!-- PAGE CONTENT -->
    <div class="content">

        <h1>Welcome to AeroStress 360</h1>

        <p>
            AI powered flight stress prediction system dashboard.
        </p>

    </div>


</body>

</html>
